name: Django CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  basckend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgre:16-alpine
        env:
          POSTGRES_DB: besat_site
          POSTGRES_USER: besat_user
          POSTGRES_PASSWORD: besat_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U besat_user -d besat_site"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10s
    
    env:
      DJANGO_READ_DOT_ENV_FILE: "False"
      DJANGO_SETTINGS_MODULE: config.settings.local
      SECRET_KEY: ci-test-secret-key
      DEBUG: "True"
      ALLOWED_HOSTS: localhost,127.0.0.1
      DATABASE_URL: postgres://besat_user:besat_password@localhost:5432/besat_site
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      CSRF_TRUSTED_ORIGINS: http://localhost:3000
      ENABLE_API_DOCS: "True"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Django check
        run: |
          cd backend
          python manage.py check

      - name: Run tests
        run: |
          cd backend
          python manage.py test
