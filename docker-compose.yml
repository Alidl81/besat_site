name: besat_site

services:
  db:
    image: postgres:16-alpine
    container_name: besat_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: besat_site
      POSTGRES_USER: besat_user
      POSTGRES_PASSWORD: besat_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U besat_user -d besat_site"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: besat_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgres://besat_user:besat_password@db:5432/besat_site
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    command: ["sh", "/app/entrypoint.sh"]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health/', timeout=5)\""]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: besat_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLISH_DATA_SOURCE: api
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api
      NEXT_SERVER_API_BASE_URL: http://backend:8000/api
      WATCHPACK_POLLING: "true"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    depends_on:
      backend:
        condition: service_started
    command: ["npm", "run", "dev", "--", "--hostname", "0.0.0.0"]

volumes:
  postgres_data:
  frontend_node_modules:
  frontend_next: